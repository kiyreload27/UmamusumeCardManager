name: Build & Release

on:
  push:
    tags:
      - 'v*'   # Triggers on any tag like v1.0.0, v27.1.0, etc.

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          pip install customtkinter

      - name: Prepare seed database
        run: python scripts/prepare_release_db.py

      - name: Build EXE with PyInstaller
        run: python -m PyInstaller UmamusumeCardManager.spec --noconfirm

      - name: Upload Windows EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/UmamusumeCardManager.exe

  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          pip install customtkinter

      - name: Prepare seed database
        run: python scripts/prepare_release_db.py

      - name: Build Linux binary with PyInstaller
        run: python -m PyInstaller UmamusumeCardManager.spec --noconfirm

      - name: Rename binary to include platform tag
        run: mv dist/UmamusumeCardManager dist/UmamusumeCardManager-linux

      - name: Upload Linux binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/UmamusumeCardManager-linux

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: ./release-assets

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: ./release-assets

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/UmamusumeCardManager.exe
            release-assets/UmamusumeCardManager-linux
          generate_release_notes: true
